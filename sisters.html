<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STEM Muslims</title>
<link rel="stylesheet" href="style.css">
<style>
  html, body {
    background: #a25ad3;
  }
</style>
</head>
<body>

  <header class="sistersbanner">
    <div class="logo">STEM<span>Muslims</span></div>
    <div class="banner-buttons">
      <a href='/'><button class="chip-btn sister">Return to Brodom</button></a>
    </div>
  </header>

  <section class="hero">
    <div class="folder-stack">
      <a class="tab tab-mq" href="madiha.html">
        <span class="tab-label">MQ</span>
        <span class="tab-caption">tap to open</span>
      </a>
      <a class="tab tab-sq" href="samiya.html">
        <span class="tab-label">SI</span>
        <span class="tab-caption">tap to open</span>
      </a>
    </div>
    <div class="hero-note">May Allah put barakah in all you do!</div>
  </section>

  <div class="section">
    <section class="section">
      <img src="images/STEMM Wesbite (24).png" alt="">
    </section>

    <section class="section">
      <img src="images/STEMM Wesbite (22).png" alt="">
    </section>

    <section class="section">
      <img src="images/lost-sisters.png" alt="">
    </section>

    <section class="section">
      <img src="images/glaze_top_bg.png" alt="">
    </section>
  </div>

  <div class="board">
    <div id="my-cards"></div>

    <!-- 3. Load the wall renderer -->
    <script src="appreciationwall.js"></script>

    <script>
      const container = document.getElementById("my-cards");

      function normalizePeople(rawPeople) {
        return (Array.isArray(rawPeople) ? rawPeople : []).map((personEntry) => {
          const assets = Array.isArray(personEntry.assets) ? personEntry.assets : [];
          const messages = Array.isArray(personEntry.messages) ? personEntry.messages : [];
          const normalizedMessages = messages
            .map((messageItem) => {
              if (typeof messageItem === "string") {
                const text = messageItem.trim();
                return text ? { text, from: "" } : null;
              }

              if (messageItem && typeof messageItem === "object") {
                const text = String(messageItem.text || "").trim();
                if (!text) return null;
                return {
                  text,
                  from: String(messageItem.from || "").trim()
                };
              }

              return null;
            })
            .filter(Boolean);

          return {
            person: String(personEntry.person || ""),
            group: String(personEntry.group || "girlies"),
            assets: assets
              .map((asset) => {
                if (!asset || !asset.backgroundSrc) return null;
                return {
                  backgroundSrc: String(asset.backgroundSrc),
                  aspectRatio: String(asset.aspectRatio || "1 / 1")
                };
              })
              .filter(Boolean),
            messages: normalizedMessages
          };
        });
      }

      async function loadCards() {
        container.textContent = "Loading submissions...";
        try {
          const [response, colorsResponse] = await Promise.all([
            fetch("/api/glaze-submissions?group=girlies"),
            fetch("images/written_glaze/girlies/colours.json")
          ]);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const payload = await response.json();
          let colorsPayload = {};
          if (colorsResponse.ok) {
            const colorText = await colorsResponse.text();
            if (colorText.trim()) {
              try {
                colorsPayload = JSON.parse(colorText);
              } catch (_) {
                colorsPayload = {};
              }
            }
          }

          const defaultNoteColors = Array.isArray(colorsPayload.defaultColors)
            ? colorsPayload.defaultColors
            : ["#F5F5DC", "#D2B48C", "#8B4513"];
          const personFavoriteColors = colorsPayload.people && typeof colorsPayload.people === "object"
            ? colorsPayload.people
            : {};

          const people = normalizePeople(payload.people);
          AppreciationWall.renderWall(container, people, {
            title: "",
            subtitle: "",
            columns: 3,
            defaultNoteColors,
            personFavoriteColors
          });
        } catch (error) {
          container.innerHTML = "";
          const fallback = document.createElement("p");
          fallback.className = "empty-note";
          fallback.textContent = "Could not load submissions. Start the local server and retry.";
          container.appendChild(fallback);
        }
      }

      loadCards();
    </script>
    <a href="submit.html"><button class="chip-btn sister-submit">Admit your undying love</button></a>
  </div>

</body>
</html>
