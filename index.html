<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STEM Muslims</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="banner">
    <div class="logo">stem<span>muslims</span></div>
    <div class="banner-buttons">
      <button class="chip-btn ghost">Incognito</button>
      <button class="chip-btn primary">Glaze Submissions</button>
    </div>
  </header>

  <section class="hero">
    <div class="folder-stack">
      <a class="tab tab-dk" href="#dk">
        <span class="tab-label">DK</span>
        <span class="tab-caption">tap to open</span>
      </a>
      <a class="tab tab-fk" href="#fk">
        <span class="tab-label">FK</span>
        <span class="tab-caption">tap to open</span>
      </a>
      <a class="tab tab-yk" href="#yk">
        <span class="tab-label">YK</span>
        <span class="tab-caption">tap to open</span>
      </a>
    </div>
    <div class="hero-note">three folders — three pages — click a tab to jump in</div>
  </section>

  <div class="sections-row">
    <section class="section">
      <img src="images/section-1.jpg" alt="">
    </section>

    <section class="section">
      <img src="images/section-2.jpg" alt="">
    </section>

    <section class="section">
      <img src="images/section-3.jpg" alt="">
    </section>
  </div>

</body>
</html>
