<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incognito</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600&display=swap');

  :root{
    --black:#050705;
    --teal-1:#0d2320;
    --teal-2:#1f4a44;
    --pill:#b7e8a0;
    --pill-text:#5c8a63;
    --neon:#c9ff5e;
    --neon-dim:rgba(201,255,94,0.55);
    --bone:#eef2ea;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html,body{
    height:100%;
    font-family:'Space Grotesk',monospace;
  }

  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      linear-gradient(to bottom, var(--black) 0%, var(--teal-1) 45%, var(--teal-2) 100%);
    background-color:var(--black);
    position:relative;
    overflow:hidden;
  }

  /* grid overlay */
  body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      linear-gradient(rgba(238,242,234,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(238,242,234,0.08) 1px, transparent 1px);
    background-size:60px 60px;
    pointer-events:none;
  }

  .password-wrap{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
    padding:0 24px;
    width:100%;
  }

  form{
    width:100%;
    max-width:760px;
  }

  .pill-input{
    width:100%;
    height:150px;
    border-radius:999px;
    border:none;
    background:var(--pill);
    color:var(--pill-text);
    font-family:'Archivo Black',sans-serif;
    font-style:italic;
    font-size:clamp(1.6rem, 4.5vw, 3rem);
    text-align:center;
    letter-spacing:0.01em;
    outline:none;
    padding:0 40px;
    transition:opacity 0.2s ease, transform 0.15s ease;
  }

  .pill-input.btn {
    display: block;
    background:var(--pill-text);
    color:var(--pill);
    width: 50%;
    height: 60px;
    margin: 20px auto;
    justify-self: center;
    font-size: clamp(1.2rem, 3vw, 1.6rem);
    padding: 0 auto;
  }

  .pill-input.btn:hover {
    background: var(--neon);
    color: var(--black);
  }

  .pill-input::placeholder{
    color:var(--pill-text);
    opacity:0.75;
  }

  .pill-input:disabled{
    opacity:0.35;
    cursor:not-allowed;
  }

  .pill-input.shake{
    animation:shake 0.4s ease;
  }

  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    20%{ transform:translateX(-10px); }
    40%{ transform:translateX(10px); }
    60%{ transform:translateX(-6px); }
    80%{ transform:translateX(6px); }
  }

  .status-msg{
    font-size:1rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--neon);
    text-align:center;
    min-height:1.4em;
  }

  .status-msg.muted{
    color:var(--neon-dim);
  }

  .status-msg.correct{
    color: var(--neon);
  }

  .status-msg.locked{
    color:#ff8a6b;
  }

  /* ---- reaction image popup ---- */
  .reaction-overlay{
    position:fixed;
    inset:0;
    z-index:10;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(5,7,5,0.55);
    opacity:0;
    transition:opacity 0.2s ease;
  }

  .reaction-overlay.show{
    display:flex;
    opacity:1;
  }

  .reaction-card{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
  }

  .reaction-img{
    max-width:min(70vw, 340px);
    max-height:60vh;
    border-radius:24px;
    border:4px solid var(--neon);
    box-shadow:0 0 40px var(--neon-dim);
    object-fit:cover;
    animation:reactionPop 0.5s ease;
  }

  @keyframes reactionPop{
    0%{ opacity:0; transform:scale(0.7) rotate(-3deg); }
    60%{ opacity:1; transform:scale(1.05) rotate(1deg); }
    100%{ opacity:1; transform:scale(1) rotate(0deg); }
  }

  .reaction-close{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:10px 28px;
    border-radius:999px;
    border:2px solid var(--neon);
    background:var(--black);
    color:var(--neon);
    font-family:'Space Grotesk',monospace;
    font-weight:600;
    letter-spacing:0.05em;
    text-transform:uppercase;
    font-size:0.9rem;
    cursor:pointer;
  }

  .reaction-close:hover{
    background:var(--neon);
    color:var(--black);
  }
</style>
</head>
<body>

  <div class="password-wrap">
    <form id="password-form" autocomplete="off">
      <input
        id="password-input"
        class="pill-input"
        type="password"
        placeholder="Enter password"
        aria-label="Enter password"
      >
      <button type="submit" class="pill-input btn">Submit</button>
    </form>
    <div id="status-msg" class="status-msg muted">3 tries remaining</div>
  </div>

  <div id="reaction-overlay" class="reaction-overlay">
    <div class="reaction-card">
      <img id="reaction-img" class="reaction-img" src="" alt="">
      <button type="button" id="reaction-close" class="reaction-close">✕ try again</button>
    </div>
  </div>

  <script>
    // ---- CONFIG ----
    const MAX_ATTEMPTS = 3;
    const LOCKOUT_MS = 5 * 60 * 1000;         // 5 minutes
    const REDIRECT_URL = "sisters.html";      // where a correct password sends them
    const LOGIN_API_URL = "/api/incognito-login";
    const STORAGE_KEY = "incognito-lock";

    // ---- REACTION IMAGES/GIFS ----
    // Drop your own image/gif URLs (or local paths like "images/wrong1.png") in here.
    // A random one from the matching array pops up each time.
    const CORRECT_IMAGES = [
      "images/nour.png"
    ];

    const WRONG_IMAGES = [
      "images/adam.gif",
      { src: "images/take-it-to-the-bros.png", link: "images/freemixing.pdf" }
    ];

    const LOCKED_IMAGES = [
      "images/mob-dawud.png"
    ];

    const reactionOverlay = document.getElementById("reaction-overlay");
    const reactionImg = document.getElementById("reaction-img");
    const reactionClose = document.getElementById("reaction-close");

    function showReaction(pool){
      if(!pool || pool.length === 0) return;
      const pick = pool[Math.floor(Math.random() * pool.length)];
      const src = typeof pick === "string" ? pick : pick.src;
      const link = typeof pick === "object" ? pick.link : null;
      
      reactionImg.src = src;
      
      if(link){
          reactionImg.style.cursor = "pointer";
          reactionImg.onclick = function(){ window.open(link, "_blank"); };
      }else{
          reactionImg.style.cursor = "default";
          reactionImg.onclick = null;
       }
      
       reactionOverlay.classList.add("show");
    }
    

    function hideReaction(){
      reactionOverlay.classList.remove("show");
      input.focus();
    }

    reactionClose.addEventListener("click", hideReaction);
    reactionOverlay.addEventListener("click", function(e){
      if(e.target === reactionOverlay) hideReaction();
    });

    const form = document.getElementById("password-form");
    const input = document.getElementById("password-input");
    const status = document.getElementById("status-msg");

    function getState(){
      try{
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { attempts: 0, lockedUntil: null };
      }catch(e){
        return { attempts: 0, lockedUntil: null };
      }
    }

    function setState(state){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function formatTime(ms){
      const totalSec = Math.max(0, Math.ceil(ms / 1000));
      const m = Math.floor(totalSec / 60);
      const s = totalSec % 60;
      return m + ":" + String(s).padStart(2, "0");
    }

    let countdownTimer = null;

    function lock(state){
      input.disabled = true;
      status.classList.remove("muted");
      status.classList.add("locked");

      function tick(){
        const remaining = state.lockedUntil - Date.now();
        if(remaining <= 0){
          clearInterval(countdownTimer);
          state.attempts = 0;
          state.lockedUntil = null;
          setState(state);
          unlock();
          return;
        }
        status.textContent = "BLOCKED! — " + formatTime(remaining);
      }

      tick();
      countdownTimer = setInterval(tick, 1000);
    }

    function unlock(){
      input.disabled = false;
      input.value = "";
      status.classList.remove("locked");
      status.classList.add("muted");
      status.textContent = MAX_ATTEMPTS + " tries remaining";
      input.focus();
    }

    function init(){
      const state = getState();
      if(state.lockedUntil && state.lockedUntil > Date.now()){
        lock(state);
      }else{
        state.attempts = 0;
        state.lockedUntil = null;
        setState(state);
        status.textContent = MAX_ATTEMPTS + " tries remaining";
      }
    }

    input.addEventListener("keydown", function(e){
      if(e.key === "Enter"){
        e.preventDefault();
        form.requestSubmit();
      }
    });

    form.addEventListener("submit", async function(e){
      e.preventDefault();
      if(input.disabled) return;

      const state = getState();

      try {
        const response = await fetch(LOGIN_API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: input.value })
        });

        if(response.ok){
          status.classList.remove("locked", "muted");
          status.classList.add("correct");
          status.textContent = "correct! welcome home ukhti";
          setState({ attempts: 0, lockedUntil: null });
          input.value = "";
          showReaction(CORRECT_IMAGES);
          setTimeout(function(){ window.location.href = REDIRECT_URL; }, 1300);
          return;
        }
      } catch (_) {
        status.classList.remove("muted");
        status.classList.add("locked");
        status.textContent = "network error - try again";
        return;
      }

      if(input.value === ""){
        status.classList.remove("locked");
        status.classList.add("muted");
        status.textContent = "enter password";
        return;
      }

      {
        status.classList.remove("locked", "muted");
        status.classList.add("muted");
      }

      state.attempts = (state.attempts || 0) + 1;
      const remaining = MAX_ATTEMPTS - state.attempts;

      input.classList.remove("shake");
      void input.offsetWidth; // restart animation
      input.classList.add("shake");
      input.value = "";

      if(remaining <= 0){
        state.lockedUntil = Date.now() + LOCKOUT_MS;
        setState(state);
        lock(state);
        showReaction(LOCKED_IMAGES);
      }else{
        setState(state);
        status.classList.remove("locked");
        status.classList.add("muted");
        status.textContent = remaining + " " + (remaining === 1 ? "try" : "tries") + " remaining";
        showReaction(WRONG_IMAGES);
      }
    });

    init();
  </script>

</body>
</html>
