<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incognito</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600&display=swap');

  :root{
    --black:#050705;
    --teal-1:#0d2320;
    --teal-2:#1f4a44;
    --pill:#b7e8a0;
    --pill-text:#5c8a63;
    --neon:#c9ff5e;
    --neon-dim:rgba(201,255,94,0.55);
    --bone:#eef2ea;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html,body{
    height:100%;
    font-family:'Space Grotesk',monospace;
  }

  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      linear-gradient(to bottom, var(--black) 0%, var(--teal-1) 45%, var(--teal-2) 100%);
    background-color:var(--black);
    position:relative;
    overflow:hidden;
  }

  /* grid overlay */
  body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      linear-gradient(rgba(238,242,234,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(238,242,234,0.08) 1px, transparent 1px);
    background-size:60px 60px;
    pointer-events:none;
  }

  .password-wrap{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
    padding:0 24px;
    width:100%;
  }

  form{
    width:100%;
    max-width:760px;
  }

  .pill-input{
    width:100%;
    height:150px;
    border-radius:999px;
    border:none;
    background:var(--pill);
    color:var(--pill-text);
    font-family:'Archivo Black',sans-serif;
    font-style:italic;
    font-size:clamp(1.6rem, 4.5vw, 3rem);
    text-align:center;
    letter-spacing:0.01em;
    outline:none;
    padding:0 40px;
    transition:opacity 0.2s ease, transform 0.15s ease;
  }

  .pill-input::placeholder{
    color:var(--pill-text);
    opacity:0.75;
  }

  .pill-input:disabled{
    opacity:0.35;
    cursor:not-allowed;
  }

  .pill-input.shake{
    animation:shake 0.4s ease;
  }

  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    20%{ transform:translateX(-10px); }
    40%{ transform:translateX(10px); }
    60%{ transform:translateX(-6px); }
    80%{ transform:translateX(6px); }
  }

  .status-msg{
    font-size:1rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--neon);
    text-align:center;
    min-height:1.4em;
  }

  .status-msg.muted{
    color:var(--neon-dim);
  }

  .status-msg.correct{
    color: var(--neon);
  }

  .status-msg.locked{
    color:#ff8a6b;
  }
</style>
</head>
<body>

  <div class="password-wrap">
    <form id="password-form" autocomplete="off">
      <input
        id="password-input"
        class="pill-input"
        type="password"
        placeholder="Enter password"
        aria-label="Enter password"
      >
    </form>
    <div id="status-msg" class="status-msg muted">3 tries remaining</div>
  </div>

  <script>
    // ---- CONFIG ----
    const CORRECT_PASSWORD = "changeme";      // swap for the real password
    const MAX_ATTEMPTS = 3;
    const LOCKOUT_MS = 5 * 60 * 1000;         // 5 minutes
    const REDIRECT_URL = "sisters.html";      // where a correct password sends them
    const STORAGE_KEY = "incognito-lock";

    const form = document.getElementById("password-form");
    const input = document.getElementById("password-input");
    const status = document.getElementById("status-msg");

    function getState(){
      try{
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { attempts: 0, lockedUntil: null };
      }catch(e){
        return { attempts: 0, lockedUntil: null };
      }
    }

    function setState(state){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function formatTime(ms){
      const totalSec = Math.max(0, Math.ceil(ms / 1000));
      const m = Math.floor(totalSec / 60);
      const s = totalSec % 60;
      return m + ":" + String(s).padStart(2, "0");
    }

    let countdownTimer = null;

    function lock(state){
      input.disabled = true;
      status.classList.remove("muted");
      status.classList.add("locked");

      function tick(){
        const remaining = state.lockedUntil - Date.now();
        if(remaining <= 0){
          clearInterval(countdownTimer);
          state.attempts = 0;
          state.lockedUntil = null;
          setState(state);
          unlock();
          return;
        }
        status.textContent = "BLOCKED! — " + formatTime(remaining);
      }

      tick();
      countdownTimer = setInterval(tick, 1000);
    }

    function unlock(){
      input.disabled = false;
      input.value = "";
      status.classList.remove("locked");
      status.classList.add("muted");
      status.textContent = MAX_ATTEMPTS + " tries remaining";
      input.focus();
    }

    function init(){
      const state = getState();
      if(state.lockedUntil && state.lockedUntil > Date.now()){
        lock(state);
      }else{
        state.attempts = 0;
        state.lockedUntil = null;
        setState(state);
        status.textContent = MAX_ATTEMPTS + " tries remaining";
      }
    }

    form.addEventListener("submit", function(e){
      e.preventDefault();
      if(input.disabled) return;

      const state = getState();

      if(input.value === CORRECT_PASSWORD){
        status.classList.remove("locked", "muted");
        status.classList.add("correct");
        status.textContent = "correct! welcome home ukhti";
        setState({ attempts: 0, lockedUntil: null });
        setTimeout(function(){ window.location.href = REDIRECT_URL; }, 900);
        return;
      }

      state.attempts = (state.attempts || 0) + 1;
      const remaining = MAX_ATTEMPTS - state.attempts;

      input.classList.remove("shake");
      void input.offsetWidth; // restart animation
      input.classList.add("shake");
      input.value = "";

      if(remaining <= 0){
        state.lockedUntil = Date.now() + LOCKOUT_MS;
        setState(state);
        lock(state);
      }else{
        setState(state);
        status.classList.remove("locked");
        status.classList.add("muted");
        status.textContent = remaining + " " + (remaining === 1 ? "try" : "tries") + " remaining";
      }
    });

    init();
  </script>

</body>
</html>
